<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Field Guide V2 · Participant + Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--neutral-100); }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: var(--text-primary);
  }
  button { font-family: inherit; }

  @keyframes fgWave {
    0%, 100% { height: 8px; }
    50% { height: 28px; }
  }
  @keyframes fgFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fgToastIn {
    from { opacity: 0; transform: translate(-50%, -8px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes fgLogIn {
    from { opacity: 0; transform: translateX(-6px); background: rgba(20,145,155,0.06); }
    to   { opacity: 1; transform: translateX(0);    background: transparent; }
  }
  @keyframes fgBreathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56,190,201,0.5); opacity: 0.85; }
    50%      { transform: scale(1.15); box-shadow: 0 0 0 24px rgba(56,190,201,0); opacity: 1; }
  }
  /* Lock animated elements to their end state so paused timelines stay visible */
  * { animation-fill-mode: both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="survey-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ipad-frame.jsx"></script>
<script type="text/babel" src="participant-view.jsx"></script>
<script type="text/babel" src="researcher-view.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
